name: CI/CD Pipeline

on:
  push:
    branches: [ production ]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ production ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with Ruff
        run: uv run ruff check .

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build

  deploy:
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/summer_dreams_ota

            # Backup Postgres Database
            echo "Backing up database..."
            docker exec summer_dreams_ota-db-1 pg_dump -U ${DB_USER:-summer_dreams} ${DB_NAME:-summer_dreams_db} | gzip > /home/backups/db_before_deploy_$(date +%F).sql.gz || echo "Backup failed or no DB container running."

            echo "Pulling latest code..."
            git pull origin production

            echo "Sequential Build to prevent OOM..."
            docker compose build frontend
            docker compose build backend

            echo "Restarting Services..."
            docker compose up -d

            echo "Pruning Old Images and Volumes..."
            docker system prune -af --volumes
