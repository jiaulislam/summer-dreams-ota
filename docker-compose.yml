services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-summer_dreams}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-summer_dreams_pass}
      POSTGRES_DB: ${DB_NAME:-summer_dreams_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-summer_dreams} -d ${DB_NAME:-summer_dreams_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgres://${DB_USER:-summer_dreams}:${DB_PASSWORD:-summer_dreams_pass}@db:5432/${DB_NAME:-summer_dreams_db}
      - DJANGO_SETTINGS_MODULE=core.settings
      - SECRET_KEY=${SECRET_KEY:-django-insecure-default-key}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${DOMAIN:-localhost},backend
      - CORS_ALLOWED_ORIGINS=https://${DOMAIN:-localhost},http://${DOMAIN:-localhost}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/media
    # Wait for migrations, collect static, then run Gunicorn
    command: >
      bash -c "uv run manage.py collectstatic --noinput &&
               gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN:-localhost}/api
      - AUTH_SECRET=${AUTH_SECRET:-your-auth-secret-here}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - django_static:/var/www/static
      - django_media:/var/www/media
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  django_static:
  django_media:
  caddy_data:
  caddy_config:
